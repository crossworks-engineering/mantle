packages:
  - "apps/*"
  - "packages/*"

# pnpm 11 requires explicit approval for packages with build scripts.
# Build scripts for anything not listed `true` are silently skipped,
# leaving esbuild / sharp / unrs-resolver as JS-only stubs with no
# native binary — which breaks Next.js dev and the worker.
allowBuilds:
  '@openrouter/sdk': true
  esbuild: true
  # Runs puppeteer's postinstall so it fetches its Chromium in dev (a no-op once
  # cached). The Docker build sets PUPPETEER_SKIP_DOWNLOAD=1 and uses the system
  # Chromium instead — see Dockerfile.
  puppeteer: true
  sharp: true
  unrs-resolver: true
