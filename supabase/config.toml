# Supabase CLI config. `supabase start` reads this.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "mantle"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
# Catches outbound dev emails for inspection at http://localhost:54324
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.mantle]
public = false
file_size_limit = "50MiB"
allowed_mime_types = []

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**", "http://localhost:3000/api/oauth/google/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
# Login uses these for sign-in. Gmail mailbox access is requested separately
# through Mantle's own /api/oauth/google flow so we can hold our own refresh
# token and not depend on the Supabase session expiring.

[auth.external.azure]
enabled = true
client_id = "env(MICROSOFT_CLIENT_ID)"
secret = "env(MICROSOFT_CLIENT_SECRET)"
url = "https://login.microsoftonline.com/common/v2.0"

[edge_runtime]
enabled = false
