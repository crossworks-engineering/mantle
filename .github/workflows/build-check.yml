# CI build-check — validate a change BEFORE it can reach a deploy.
#
# Runs typecheck + lint (ESLint) + format check (Prettier) + the full vitest
# suite + the server/web PRODUCTION build (the edge-runtime / webpack gate that
# tsc + vitest miss — see docs/deploy-preflight). This is the durable
# replacement for building locally or on a worktree: the build runs OFF your
# machine, on the right tree, before anything is merged or tagged.
#
# Triggers:
#   - push to feat/** — validate a branch as you work, before opening a PR / merge
#   - pull_request to main — gate the merge
#   - push to main — re-validate the merge result (the automated "merge then
#     build" safety net; deploy is still a separate manual tag)
#
# Hermetic — no Postgres/MinIO needed: `next build` runs DB-less (same as the
# Dockerfile image build), and the vitest suite is designed to pass without
# infra (e.g. resolver.test.ts deletes DATABASE_URL on purpose).
#
# Note: this does NOT build or push the Docker image — that's release.yml, which
# fires on a version tag. This is purely a pre-merge correctness gate.

name: build-check

on:
  push:
    branches: ['main', 'feat/**', 'true-server-split']
  pull_request:
    branches: ['main']

# A newer commit on the same ref supersedes an in-flight run.
concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # pnpm first, so setup-node's pnpm cache has a binary to key on. Version
      # matches package.json `packageManager` (pnpm@11.1.2).
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # package.json engines: node >=24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      # Lint (ESLint flat config) + formatting (Prettier) — the quality gate.
      # Cheap and fails fast, so a formatting/lint slip is caught before the
      # slower test + build steps run.
      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      # The real edge/webpack gate. Runs without a DB, same as the image build.
      - name: Build (server/web)
        run: pnpm -C server/web build

  # The e2e regression net for the server/client split (e2e/). Boots the
  # hermetic throwaway stack (pg + minio + browser sidecar on shifted ports),
  # runs the web app on :3900, and drives the same-origin Playwright project —
  # real signup/onboarding, pages CRUD, SSE, ?at= assets, share, team token,
  # PDF export, /app-runtime CORS. The split project runs off-CI against a
  # two-origin stack (see e2e/README.md).
  e2e:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm -C e2e exec playwright install --with-deps chromium

      - name: Run e2e (same-origin, hermetic stack)
        run: bash e2e/scripts/run-local.sh

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            e2e/.artifacts/web.log
            e2e/test-results/
          retention-days: 7
