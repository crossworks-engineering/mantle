# Release pipeline — fires on a version tag push:
#
#   pnpm version:bump patch && git commit … && git tag v0.20.71
#   git push origin main v0.20.71
#
# 1. Builds the single Mantle image (one image runs web, agent, workers,
#    migrate — see Dockerfile) for amd64 + arm64, each on its OWN native
#    GitHub runner in parallel, then merges them into one multi-arch manifest
#    pushed to Docker Hub as <namespace>/mantle:<tag> and :latest.
# 2. Cuts a GitHub Release carrying the deploy bundle (docker-compose.yml,
#    .env.prod.example, infra/, install.sh, db scripts) so compose + image are
#    versioned TOGETHER — the contract docs/self-hosting.md documents.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME   (titanwest)
#   DOCKERHUB_TOKEN      (a Docker Hub access token with read/write scope)
#
# Why the matrix instead of one QEMU job: GitHub's standard runners are
# amd64-only, so a single multi-arch build emulates arm64 under QEMU (slow —
# emulated native-module compiles + `next build`). GitHub now offers FREE
# native arm64 runners for public repos (`ubuntu-24.04-arm`), so we build each
# arch natively in parallel (push-by-digest), then `imagetools create` stitches
# the two digests into the tagged manifest. No emulation; wall-clock ≈ the
# slower single native build, not the sum.

name: release

on:
  push:
    tags: ['v*']

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mantle

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Platform label
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build this single arch natively and push it BY DIGEST (no tag yet) —
      # the merge job assembles the tagged multi-arch manifest from both digests.
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          platforms: ${{ matrix.platform }}
          build-args: |
            MANTLE_GIT_SHA=${{ github.sha }}
            MANTLE_BUILD_TIME=${{ github.event.head_commit.timestamp }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch cache scope so the two runners don't clobber each other's cache.
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      # Name the marker file with the BARE hex (strip the sha256: prefix); the
      # merge job re-adds @sha256: when it assembles the manifest. Keeping the
      # prefix here would double it (…@sha256:sha256:…) and break the merge.
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create + push the multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${{ github.ref_name }}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "${IMAGE}:${{ github.ref_name }}"

      # Tables v2 foundation gate: node:sqlite is experimental upstream, so the
      # engine behaviors table storage leans on (readOnly enforcement, FTS5
      # trigram, VACUUM INTO under WAL, …) are re-proven on the ACTUAL image —
      # the exact Node binary boxes will run — before the release is cut. A
      # drifted image fails here instead of on a customer box.
      - name: Probe node:sqlite on the prod image
        run: |
          docker run --rm "${IMAGE}:${{ github.ref_name }}" \
            pnpm -C apps/web exec tsx ../../packages/tabledb/src/probes-cli.ts

  release:
    needs: merge
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Assemble deploy bundle
        run: |
          mkdir -p dist/mantle-deploy
          cp docker-compose.yml .env.prod.example install.sh dist/mantle-deploy/
          cp -R infra dist/mantle-deploy/infra
          mkdir -p dist/mantle-deploy/scripts
          cp scripts/db-dump.sh scripts/db-restore.sh scripts/install.sh scripts/sanity.sh scripts/compose-adopt.sh dist/mantle-deploy/scripts/
          tar -C dist -czf "dist/mantle-deploy-${{ github.ref_name }}.tar.gz" mantle-deploy
          (cd dist && sha256sum "mantle-deploy-${{ github.ref_name }}.tar.gz" > SHA256SUMS)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Mantle ${{ github.ref_name }}" \
            --generate-notes \
            "dist/mantle-deploy-${{ github.ref_name }}.tar.gz" \
            dist/SHA256SUMS
