# Release pipeline — fires on a version tag push:
#
#   pnpm version:bump patch && git commit … && git tag v0.20.67
#   git push origin main v0.20.67
#
# 1. Builds the single Mantle image for amd64 + arm64 (one image runs web,
#    agent, workers, migrate — see Dockerfile) and pushes it to Docker Hub as
#    <namespace>/mantle:<tag> and :latest.
# 2. Cuts a GitHub Release carrying the deploy bundle (docker-compose.yml,
#    .env.prod.example, infra/, install.sh, db scripts) so compose + image are
#    versioned TOGETHER — the contract docs/self-hosting.md documents.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME   (titanwest)
#   DOCKERHUB_TOKEN      (a Docker Hub access token with read/write scope)
#
# The arm64 half builds under QEMU emulation — expect the job to take a while
# (the Next build + native-module compiles run emulated). It's CI time, not
# operator time; the buildx layer cache (type=gha) keeps repeat runs sane.

name: release

on:
  push:
    tags: ['v*']

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mantle

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
          build-args: |
            MANTLE_GIT_SHA=${{ github.sha }}
            MANTLE_BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: image
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Assemble deploy bundle
        run: |
          mkdir -p dist/mantle-deploy
          cp docker-compose.yml .env.prod.example install.sh dist/mantle-deploy/
          cp -R infra dist/mantle-deploy/infra
          mkdir -p dist/mantle-deploy/scripts
          cp scripts/db-dump.sh scripts/db-restore.sh dist/mantle-deploy/scripts/
          tar -C dist -czf "dist/mantle-deploy-${{ github.ref_name }}.tar.gz" mantle-deploy
          (cd dist && sha256sum "mantle-deploy-${{ github.ref_name }}.tar.gz" > SHA256SUMS)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Mantle ${{ github.ref_name }}" \
            --generate-notes \
            "dist/mantle-deploy-${{ github.ref_name }}.tar.gz" \
            dist/SHA256SUMS
