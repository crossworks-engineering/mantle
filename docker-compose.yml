name: mantle

# Mantle full stack: postgres + minio + web + agent + workers.
# For local dev, prefer `pnpm up` (uses docker-compose.dev.yml — infra only,
# app in native Node for hot-reload). This file is for prod-shaped deploys
# where everything runs in containers.
#
# Required env (drop in .env next to this file — see .env.prod.example):
#   POSTGRES_PASSWORD       (default: postgres)
#   SESSION_SECRET          (mandatory — used by middleware to verify cookies)
#   MANTLE_MASTER_KEY       (mandatory — AES-256 key, base64 32 random bytes)
#   ALLOWED_USER_ID         (optional — blank on a fresh install; auto-resolves
#                            to the sole auth.users row after you sign up)
#   S3_ACCESS_KEY / S3_SECRET_KEY (default: minio/minio12345)
#   MANTLE_PUBLIC_URL       (recommended — public origin for share/email links,
#                            e.g. https://mantle.crossworks.network)
#   MANTLE_SITE_ADDRESS     (the address Caddy serves — a hostname gets automatic
#                            HTTPS, e.g. mantle.crossworks.network; defaults to
#                            :80 plain HTTP for local testing. Open 80+443 + DNS.)
#   MANTLE_LOCAL_EMBEDDING_URL (default: http://ollama:11434/v1 — the bundled
#                            embedder; no need to set unless pointing elsewhere)
#   MANTLE_EMBEDDING_PULL_MODEL (default: embeddinggemma — the model the one-shot
#                            pulls on first boot)
#   OLLAMA_KEEP_ALIVE       (default: 5m — set to -1 to keep the embedder always
#                            resident instead of unloading when idle)
#
# Persistent data — bind-mounted on the host so you can see/back up/move it:
#   MANTLE_DATA_DIR         (default: ./data) — EVERYTHING lives under here:
#                            postgres, minio, files, backups, app-dbs, caddy
#                            (certs), ollama, tailscale, update-signal. Back this
#                            up (restic/Syncthing) and it IS your brain. The DB,
#                            though, should be MOVED
#                            between machines via pg_dump (scripts/db-dump.sh),
#                            not by copying the raw postgres dir. See docs/deploy.md.
#
# Docker Hub — build once, push, pull on the VPS (no build on prod):
#   MANTLE_IMAGE_NAMESPACE  (default: titanwest — the official published image;
#                            set your own Docker Hub user/org to self-build).
#   MANTLE_IMAGE_TAG        (default: latest) — image tag (use a version or git sha).
#   Build & push:  scripts/docker-build-push.sh
#   Deploy on VPS: docker compose pull && docker compose up -d --wait
#
# Optional — reach models on a box you own behind NAT (home GPU / LAN server):
#   docker compose --profile tailnet up -d   (off by default)
#   TS_AUTHKEY              (Tailscale auth key — generate in the TS admin console)
#   TS_HOSTNAME             (default: mantle-vps — this node's name on the tailnet)
#   See docs/tailscale.md.
#
# Embedding is ONLINE by default — configured in onboarding (text-embedding-3-large,
# 768-dim). The local embedder (bundled Ollama, EmbeddingGemma) is OPT-IN and does
# NOT run unless you start it: `docker compose --profile local-embedder up -d`
# (that pulls the ~300MB model into a named volume). No app service waits on it, so
# a fresh box boots even on a locked-down network. Migrations run automatically —
# the one-shot `migrate` service applies them before any app service starts.

volumes:
  # POLICY: ALL persistent data is bind-mounted to the local drive under
  # MANTLE_DATA_DIR — postgres, minio, files, backups, app-dbs, caddy (ACME
  # certs), ollama (model cache), tailscale (node state), and update-signal.
  # So every byte lives on the mounted data disk, is captured by that disk's
  # backup/snapshot, and can NEVER be wiped by `docker compose down -v` or a
  # volume prune. Caddy's certs at ${MANTLE_DATA_DIR}/caddy survive redeploys,
  # so there's no Let's Encrypt re-issuance / rate-limit risk.
  #
  # The ONLY named volume is the tailscaled IPC socket dir below: a live unix
  # socket shared web↔tailscale (optional `tailnet` profile), not durable data
  # — a host bind there buys nothing and risks breaking the socket.
  mantle_tailscale_sock:

# Shared env block for app services — anchor + alias keeps the app
# services in lockstep.
x-app-env: &app-env
  DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
  SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
  MANTLE_MASTER_KEY: ${MANTLE_MASTER_KEY:?MANTLE_MASTER_KEY is required}
  # Blank on a fresh install — the runtime auto-resolves the sole auth.users
  # row once you sign up. Only set when importing existing data / multi-DB.
  # (Was `:?required`, which contradicted .env.prod.example and broke fresh
  # installs before any user exists.)
  ALLOWED_USER_ID: ${ALLOWED_USER_ID:-}
  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_BUCKET: mantle
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minio12345}
  S3_FORCE_PATH_STYLE: 'true'
  NODE_ENV: production
  MANTLE_EMBEDDING_MODEL: ${MANTLE_EMBEDDING_MODEL:-}
  # Self-hosted embedder. Points at the bundled `ollama` service serving
  # EmbeddingGemma (768-dim). This is what makes local embedding work out of
  # the box — no cloud key, no API calls, fast. The resolver already defaults
  # a fresh install to local/embeddinggemma:latest; this just supplies the host.
  MANTLE_LOCAL_EMBEDDING_URL: ${MANTLE_LOCAL_EMBEDDING_URL:-http://ollama:11434/v1}
  # Extractor worker concurrency (in-flight extraction jobs). Default 2 suits a
  # multi-core / GPU box. Drop to 1 on a CPU-only embedder: concurrent jobs
  # otherwise contend for the same cores and a big file's embed batch can blow
  # past the local-embedder timeout mid-run. Clamped 1..8 in code.
  EXTRACT_CONCURRENCY: ${EXTRACT_CONCURRENCY:-2}
  # Texts per local-embedder HTTP request. Default 16 clears the per-request
  # timeout on a shared vCPU; lower (e.g. 8) on an especially slow box so each
  # request finishes inside the window, raise on a GPU. The embedding cache makes
  # a retry resume from completed sub-batches.
  MANTLE_LOCAL_EMBED_BATCH: ${MANTLE_LOCAL_EMBED_BATCH:-16}
  # Per-request timeout (ms) for the local embedder. Generous by default because
  # the slow case is legitimate CPU inference, not a hung socket; raise on very
  # slow hardware so a sub-batch isn't aborted prematurely.
  MANTLE_LOCAL_EMBED_TIMEOUT_MS: ${MANTLE_LOCAL_EMBED_TIMEOUT_MS:-120000}
  # HTTP forward-proxy for reaching models on your tailnet (the optional
  # `tailnet` profile). Only used for routes the operator flags "via tailnet";
  # harmless otherwise. Points at the bundled tailscale service.
  MANTLE_TAILNET_PROXY_URL: ${MANTLE_TAILNET_PROXY_URL:-http://tailscale:1055}
  # Path to the tailscaled LocalAPI socket (shared from the tailscale sidecar).
  # The /settings/network status tile + peer dropdown read `status` over it.
  # Absent socket → the reader reports "tailnet not running" (never throws).
  MANTLE_TAILSCALE_SOCK: ${MANTLE_TAILSCALE_SOCK:-/var/run/tailscale/tailscaled.sock}
  MANTLE_FILES_ROOT: /data/files
  # Per-app SQLite databases for the /apps mini-app builder. One file per app
  # (<root>/<owner>/<app>.sqlite, see packages/content/src/app-broker.ts). MUST be
  # on a persistent host bind-mount — without this the SQLite files land in the
  # container's ephemeral cwd and every app loses its data on each redeploy. The
  # web AND api services mount ${MANTLE_DATA_DIR}/app-dbs here.
  APP_DB_DIR: /data/app-dbs
  # Per-table SQLite files for sqlite-native Tables (Tables v2). One workbook
  # file per table node (<root>/<owner>/<node>.sqlite + .draft.sqlite, see
  # packages/tabledb). Tool handlers run in BOTH web and api, so BOTH services
  # mount ${MANTLE_DATA_DIR}/table-dbs here — a table file missing from one
  # process is a data-loss-shaped bug the /debug sanity check screams about.
  # Same-host bind mount only (NFS unsupported for cross-process sqlite).
  TABLE_DB_DIR: /data/table-dbs
  # Scheduled local backups (/settings/backups) write pg_dump archives here;
  # bind-mounted to ${MANTLE_DATA_DIR}/backups on the host so the operator's
  # own offsite sync (rsync/rclone/restic) can pick them up. The web service
  # mounts it too ("Run backup now" + the on-disk listing); the events worker
  # hosts the scheduler tick.
  MANTLE_BACKUP_DIR: /data/backups
  # Documentation root: where the docs-sync worker reads markdown for the
  # `documentation` node type. Baked into the image at /app/docs (the repo's
  # docs/). Read-only in prod (one-way disk → DB; reconcile-on-boot indexes it).
  MANTLE_DOCS_ROOT: /app/docs
  # Public origin for absolute links built outside an HTTP request — e.g. the
  # agent's page_share / email_page tools. Falls back to localhost in code if
  # unset, so set it to the real host (https://mantle.crossworks.network).
  MANTLE_PUBLIC_URL: ${MANTLE_PUBLIC_URL:-}
  # CORS allowlist for detached frontends (comma-separated origins, or '*' for
  # the non-auth data API). OFF by default — same-origin clients need no CORS.
  # Set on a box that serves a detached dev frontend (docs/db-less-dev.md).
  MANTLE_API_CORS_ORIGINS: ${MANTLE_API_CORS_ORIGINS:-}
  # Tika document-parser fallback (.odt / .pptx / .doc / .rtf / …). Reached
  # by service name on the internal docker network. See docs/file-ingestion.md.
  TIKA_URL: http://tika:9998
  # Browser sidecar (PDF export) — same pattern as Tika: reached by service
  # name on the internal network, driven via puppeteer-core websocket. The
  # token gates nothing externally (no published port) but browserless
  # requires one; override with BROWSER_TOKEN in .env if desired.
  BROWSER_WS_ENDPOINT: ws://browser:3000?token=${BROWSER_TOKEN:-mantle}
  # Where Chromium-in-the-sidecar fetches /print/pages/<id> — the app itself,
  # by service DNS, never the public origin (no Caddy/TLS round-trip).
  MANTLE_PRINT_ORIGIN: http://web:3000

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mantle_pg
    restart: unless-stopped
    # Headroom above the default 100: the full stack (web + agent + 4 workers,
    # each a postgres-js pool, plus pg-boss + web SSE LISTEN conns) sits ~50 at
    # idle and climbs under load. A crash-looping service can briefly double its
    # connection churn and exhaust 100, wedging the DB (even psql locked out).
    # 200 is cheap on an 11 GB box (~10 MB/conn worst case) and absorbs spikes.
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      # Bind-mounted on the host so the DB lives at a path you control.
      # NOTE: to MOVE the DB to another machine, use pg_dump (scripts/db-dump.sh)
      # — copying this raw dir only works same-PG-major + clean shutdown.
      - ${MANTLE_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: mantle_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio12345}
    volumes:
      - ${MANTLE_DATA_DIR:-./data}/minio:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # One-shot: create the object-store bucket the app writes to. MinIO ships
  # empty — `mc ready` (the health gate above) only means the SERVER is up, not
  # that the bucket exists. Without this, the first upload / app build / file
  # ingest on a fresh box fails "The specified bucket does not exist" (the app
  # only HEADs the bucket, never creates it — see packages/storage/src/index.ts).
  # The dev path (scripts/up.sh) does the same `mc mb`; this is its prod twin.
  # Idempotent (`--ignore-existing`), so it's a no-op on every later boot. Every
  # service that writes object bytes depends_on this completing.
  createbuckets:
    image: minio/mc:latest
    container_name: mantle_createbuckets
    restart: "no"
    depends_on:
      minio: { condition: service_healthy }
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio12345}
      S3_BUCKET: ${S3_BUCKET:-mantle}
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY"
        mc mb --ignore-existing "local/$$S3_BUCKET"
        mc anonymous set none "local/$$S3_BUCKET"
        echo "[createbuckets] bucket '$$S3_BUCKET' ready"

  # Apache Tika — document-parser fallback for formats our in-process parsers
  # don't cover (.odt / .ods / .odp / .pptx / .ppt / .doc / .rtf / .epub / …).
  # Self-hosted; bytes stay on the VPS. Stateless — no volume.
  tika:
    image: apache/tika:3.3.0.0
    container_name: mantle_tika
    restart: unless-stopped
    environment:
      # Cap JVM heap so Tika can't balloon on a malicious or pathological
      # document, while leaving headroom for legitimately large Office files.
      # 512m was too tight: a ~24 MB .pptx / text-heavy .docx unzips to many
      # times its size as XML, and Tika holds that in heap — big real decks
      # OOM'd to an empty parse (no_text_layer). 1g roughly doubles the budget
      # and still fits the 4 GB minimum box (stack idles ~2.5 GB; -Xms stays
      # low at 128m so idle Tika is ~40 MB — only a big parse climbs toward the
      # ceiling). On an 8 GB+ box with heavy deck/Office workloads, -Xmx2g is
      # safe. JAVA_TOOL_OPTIONS not JAVA_OPTS — Tika's launcher doesn't
      # propagate JAVA_OPTS to the forked TikaServerProcess (verified live).
      JAVA_TOOL_OPTIONS: "-Xmx1g -Xms128m"
    healthcheck:
      # apache/tika image has only bash (no curl/wget/nc), so probe via
      # bash's built-in /dev/tcp + a minimal HTTP/1.0 GET against /version.
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/localhost/9998 || exit 1; printf "GET /version HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3; read -t 2 line <&3; [[ "$$line" == *"200 OK"* ]]'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Browser sidecar (browserless/chromium) — the PDF-export render engine, run
  # exactly like Tika: a stateless, self-hosted service with its own memory
  # space, session queue, and per-session hard timeout. apps/web connects with
  # puppeteer-core over websocket (BROWSER_WS_ENDPOINT) and drives it to print
  # the owner-authed /print/pages/<id> surface — so the PDF reuses the live
  # page CSS byte-for-byte. No published ports: only the internal network can
  # reach it, and a crashed/pathological render dies here, never in web.
  # See apps/web/lib/render-pdf.ts.
  browser:
    image: ghcr.io/browserless/chromium:v2.54.2
    container_name: mantle_browser
    restart: unless-stopped
    environment:
      TOKEN: ${BROWSER_TOKEN:-mantle}
      # Two concurrent renders + a small queue covers a team clicking Download;
      # 60s per-session cap kills stuck renders. Raise CONCURRENT on big boxes
      # if PDF exports start queueing (503s with 'queue is full').
      CONCURRENT: "2"
      QUEUED: "10"
      TIMEOUT: "60000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/meta?token=$${TOKEN} >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Ollama — serves the bundled local embedder (EmbeddingGemma, 768-dim) over an
  # OpenAI-compatible API. CPU-only; a small encoder (~300MB) that fits on the
  # base VPS. Self-hosted — the text the brain embeds never leaves the box.
  ollama:
    image: ollama/ollama:latest
    container_name: mantle_ollama
    restart: unless-stopped
    # OPT-IN. The local embedder only starts with `--profile local-embedder`.
    # Online embedding (set up in onboarding) is the default; by default this
    # service does NOT run and NO app service waits on it — so a fresh box boots
    # even on a locked-down network that can't pull the ~300MB model.
    profiles: ["local-embedder"]
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    volumes:
      - ${MANTLE_DATA_DIR:-./data}/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # One-shot: pull the shipped embedder into the model volume, then exit.
  # Idempotent — a no-op once the model is already in the volume.
  ollama_pull:
    image: ollama/ollama:latest
    container_name: mantle_ollama_pull
    restart: "no"
    profiles: ["local-embedder"]
    depends_on:
      ollama: { condition: service_healthy }
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "${MANTLE_EMBEDDING_PULL_MODEL:-embeddinggemma}"]

  # ── Tailscale (OPTIONAL — `tailnet` profile) ──────────────────────────────
  # Reaches capable chat/vision models running on a box you own (home GPU, LAN
  # server) behind NAT — without port-forwarding. Joins your tailnet; the app
  # then reaches `http://<magicdns-name>:<port>` for that box. See docs/tailscale.md.
  # Always-up so the app can drive login from the UI (/settings/network). It
  # runs UNAUTHENTICATED until you save an auth key + click Activate — the app
  # then logs tailscaled in over the shared socket (see lib/tailscale.ts
  # tailnetUp/Down).
  #
  # We run `tailscaled` DIRECTLY, bypassing the image's `containerboot`
  # entrypoint. containerboot insists on running its own keyless `tailscale up`
  # in a retry loop, which clobbers the app's auth-key login and forces an
  # interactive browser-auth URL — fighting UI activation. tailscaled alone just
  # serves the LocalAPI and waits to be told to log in. The flags here mirror
  # what the TS_* env vars used to configure (userspace, state dir, socket, the
  # outbound HTTP proxy on :1055). Image PINNED (tailscale/tailscale#16108);
  # override via TS_IMAGE_TAG.
  tailscale:
    image: tailscale/tailscale:${TS_IMAGE_TAG:-v1.98.4}
    container_name: mantle_tailscale
    restart: unless-stopped
    entrypoint:
      - tailscaled
      - --tun=userspace-networking
      - --statedir=/var/lib/tailscale
      - --socket=/var/run/tailscale/tailscaled.sock
      - --outbound-http-proxy-listen=0.0.0.0:1055
    volumes:
      - ${MANTLE_DATA_DIR:-./data}/tailscale:/var/lib/tailscale
      - mantle_tailscale_sock:/var/run/tailscale
    # `tailscale status` exits non-zero while unauthenticated, so health is just
    # "tailscaled is up + the socket is listening" — true whether or not we've
    # joined a tailnet. Nothing depends_on this service.
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/run/tailscale/tailscaled.sock"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s

  # One-shot schema migration. App services wait for this to complete
  # successfully before starting, so the DB schema is never behind the code.
  migrate:
    image: ${MANTLE_IMAGE_NAMESPACE:-titanwest}/mantle:${MANTLE_IMAGE_TAG:-latest}
    # Drizzle migrations, THEN create the pg-boss schema deterministically in the
    # same one-shot gate — every worker depends_on this completing, so by the time
    # they call pg-boss start() the schema exists and they can't race to create it
    # (which on a fresh DB leaves it uncreated). Idempotent on an existing brain.
    command: ["sh", "-c", "pnpm -C packages/db migrate && pnpm -C apps/web pgboss:init && pnpm -C apps/api provision"]
    container_name: mantle_migrate
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      <<: *app-env

  # `web` is the one service that BUILDS the shared image (target: app); every
  # other service just references the same image with its own command.
  web:
    image: ${MANTLE_IMAGE_NAMESPACE:-titanwest}/mantle:${MANTLE_IMAGE_TAG:-latest}
    build:
      context: .
      target: app
      args:
        # Stamped by scripts/docker-build-push.sh (git SHA + UTC build time).
        MANTLE_GIT_SHA: ${MANTLE_GIT_SHA:-}
        MANTLE_BUILD_TIME: ${MANTLE_BUILD_TIME:-}
    container_name: mantle_web
    restart: unless-stopped
    depends_on:
      postgres:      { condition: service_healthy }
      minio:         { condition: service_healthy }
      createbuckets: { condition: service_completed_successfully }
      migrate:       { condition: service_completed_successfully }
    environment:
      <<: *app-env
    volumes:
      - ${MANTLE_DATA_DIR:-./data}/files:/data/files
      - ${MANTLE_DATA_DIR:-./data}/backups:/data/backups
      # Per-app SQLite (APP_DB_DIR=/data/app-dbs) — persistent so /apps data
      # survives redeploys.
      - ${MANTLE_DATA_DIR:-./data}/app-dbs:/data/app-dbs
      # Per-table SQLite (TABLE_DB_DIR=/data/table-dbs) — sqlite-native Tables.
      # Mounted into web AND api (handlers run in both processes).
      - ${MANTLE_DATA_DIR:-./data}/table-dbs:/data/table-dbs
      # READ-WRITE view of the tailscaled LocalAPI socket. Read drives the
      # /settings/network status tile + peer dropdown; write lets the app log
      # tailscaled in/out from the UI (Activate/Deactivate). RW is the one
      # security-relevant change — the app can control tailnet membership —
      # acceptable on a single-user box. Degrades gracefully when absent.
      - mantle_tailscale_sock:/var/run/tailscale
      # In-app updates: /settings/updates writes request.json here and reads
      # the updater sidecar's status.json / update.log back. Absent in dev →
      # the page degrades to "updater not available".
      - ${MANTLE_DATA_DIR:-./data}/update-signal:/signal
    # No public port: Caddy fronts the app and reaches it at web:3000 on the
    # internal network. Bound to localhost only for on-host debugging / ssh
    # tunnels — not reachable from the internet.
    ports:
      - "127.0.0.1:3000:3000"
    # Liveness: is the Next.js server actually answering HTTP? `fetch` rejects
    # ONLY on a network error (connection refused / not listening), so any
    # response — including the 401 this owner-gated route returns when
    # unauthenticated — means the app is up. Uses node (curl is purged from the
    # final image). Makes `up -d --wait` and Caddy's depends_on gate on a
    # working app instead of just a started container.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # ── Caddy: TLS-terminating reverse proxy — the public front door ───────────
  # Automatic HTTPS (Let's Encrypt) when MANTLE_SITE_ADDRESS is a hostname;
  # plain HTTP on :80 otherwise. Proxies public 80/443 → internal web:3000.
  # Point a DNS A record at the VPS and open 80 + 443 before first boot.
  caddy:
    image: caddy:2-alpine
    container_name: mantle_caddy
    restart: unless-stopped
    depends_on:
      web: { condition: service_healthy }
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3 (QUIC)
    environment:
      # Drives the Caddyfile site block. Hostname → auto-TLS; ":80" → HTTP only.
      MANTLE_SITE_ADDRESS: ${MANTLE_SITE_ADDRESS:-:80}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${MANTLE_DATA_DIR:-./data}/caddy/data:/data
      - ${MANTLE_DATA_DIR:-./data}/caddy/config:/config

  # ── Updater sidecar — the execution half of in-app updates ────────────────
  # /settings/updates writes a request file into the shared `mantle_update_signal`
  # volume; this container performs `docker compose pull && up -d` against the
  # host stack and reports progress back. It holds the Docker socket
  # (root-equivalent on the host) — mitigations: no ports, one hardcoded
  # operation (see infra/updater/updater.sh), trigger only via the private
  # volume. Needs MANTLE_STACK_DIR in .env = the stack dir's HOST-ABSOLUTE path
  # (install.sh writes it; for an existing install add it by hand). The stack is
  # mounted at the SAME path inside the container so relative bind-mount sources
  # in this file resolve identically for the host daemon.
  updater:
    image: docker:28-cli
    container_name: mantle_updater
    restart: unless-stopped
    entrypoint: ["sh", "/updater.sh"]
    environment:
      MANTLE_STACK_DIR: ${MANTLE_STACK_DIR:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/updater/updater.sh:/updater.sh:ro
      - .:${MANTLE_STACK_DIR:-/opt/mantle-stack}
      - ${MANTLE_DATA_DIR:-./data}/update-signal:/signal

  # Dedicated durable-runner service: executes assistant/agent LLM work as DBOS
  # workflows (journaled to the mantle_dbos_sys system DB, provisioned in the
  # migrate gate) so a turn survives navigation + a web restart. It ALSO hosts
  # the absorbed agent runtime — the Telegram responder + the summarize/extract/
  # heartbeat listeners + the reflector/heartbeat/extract-sweep ticks (formerly
  # the separate `agent` service). Same image, different command.
  api:
    image: ${MANTLE_IMAGE_NAMESPACE:-titanwest}/mantle:${MANTLE_IMAGE_TAG:-latest}
    command: ["pnpm", "-C", "apps/api", "start"]
    container_name: mantle_api
    restart: unless-stopped
    depends_on:
      postgres:      { condition: service_healthy }
      minio:         { condition: service_healthy }
      createbuckets: { condition: service_completed_successfully }
      migrate:       { condition: service_completed_successfully }
    environment:
      <<: *app-env
    volumes:
      - ${MANTLE_DATA_DIR:-./data}/files:/data/files
      # Per-app SQLite (APP_DB_DIR=/data/app-dbs) — the api also serves /apps
      # (agent app_build + runtime), so it shares the same persistent mount.
      - ${MANTLE_DATA_DIR:-./data}/app-dbs:/data/app-dbs
      # Per-table SQLite (TABLE_DB_DIR=/data/table-dbs) — same dual-mount
      # contract as app-dbs: agent table tools execute here too.
      - ${MANTLE_DATA_DIR:-./data}/table-dbs:/data/table-dbs

  worker_email:
    image: ${MANTLE_IMAGE_NAMESPACE:-titanwest}/mantle:${MANTLE_IMAGE_TAG:-latest}
    command: ["pnpm", "-C", "apps/web", "exec", "tsx", "workers/email-sync.ts"]
    container_name: mantle_worker_email
    restart: unless-stopped
    depends_on:
      postgres:      { condition: service_healthy }
      minio:         { condition: service_healthy }
      createbuckets: { condition: service_completed_successfully }
      migrate:       { condition: service_completed_successfully }
    environment:
      <<: *app-env

  worker_telegram:
    image: ${MANTLE_IMAGE_NAMESPACE:-titanwest}/mantle:${MANTLE_IMAGE_TAG:-latest}
    command: ["pnpm", "-C", "apps/web", "exec", "tsx", "workers/telegram-poll.ts"]
    container_name: mantle_worker_telegram
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    environment:
      <<: *app-env

  # Microsoft drive sync: delta-syncs enabled OneDrive / SharePoint document
  # libraries into the brain as file nodes. Needs MinIO (file bytes → storage)
  # like the email worker.
  worker_microsoft:
    image: ${MANTLE_IMAGE_NAMESPACE:-titanwest}/mantle:${MANTLE_IMAGE_TAG:-latest}
    command: ["pnpm", "-C", "apps/web", "exec", "tsx", "workers/microsoft-sync.ts"]
    container_name: mantle_worker_microsoft
    restart: unless-stopped
    depends_on:
      postgres:      { condition: service_healthy }
      minio:         { condition: service_healthy }
      createbuckets: { condition: service_completed_successfully }
      migrate:       { condition: service_completed_successfully }
    environment:
      <<: *app-env

  # External-edit watcher: chokidar over MANTLE_FILES_ROOT mirrors host file
  # changes (Syncthing / vim / cp) into the brain. Needs the files volume.
  worker_files:
    image: ${MANTLE_IMAGE_NAMESPACE:-titanwest}/mantle:${MANTLE_IMAGE_TAG:-latest}
    command: ["pnpm", "-C", "apps/web", "exec", "tsx", "workers/files-watch.ts"]
    container_name: mantle_worker_files
    restart: unless-stopped
    depends_on:
      postgres:      { condition: service_healthy }
      minio:         { condition: service_healthy }
      createbuckets: { condition: service_completed_successfully }
      migrate:       { condition: service_completed_successfully }
    environment:
      <<: *app-env
    volumes:
      - ${MANTLE_DATA_DIR:-./data}/files:/data/files

  # Documentation sync: reconciles + watches the docs/ baked into the image and
  # indexes ENABLED collections into the brain (the `documentation` node type).
  # No volume — docs are read-only in the image; reconcile-on-boot is the prod
  # indexing path. Disabled collections are inert, so this is cheap until the
  # operator opts in at /settings/documentation.
  worker_docs:
    image: ${MANTLE_IMAGE_NAMESPACE:-titanwest}/mantle:${MANTLE_IMAGE_TAG:-latest}
    command: ["pnpm", "-C", "apps/web", "exec", "tsx", "workers/docs-sync.ts"]
    container_name: mantle_worker_docs
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    environment:
      <<: *app-env

  # Event-reminder poller: fires due calendar/event reminders. Without this,
  # reminders silently never fire in prod (they work in `pnpm dev`).
  worker_events:
    image: ${MANTLE_IMAGE_NAMESPACE:-titanwest}/mantle:${MANTLE_IMAGE_TAG:-latest}
    command: ["pnpm", "-C", "apps/web", "exec", "tsx", "workers/events-reminders.ts"]
    container_name: mantle_worker_events
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    environment:
      <<: *app-env
    volumes:
      # Scheduled backups land here (see MANTLE_BACKUP_DIR in x-app-env).
      - ${MANTLE_DATA_DIR:-./data}/backups:/data/backups

  # Calendar sync: pulls subscribed external calendars (ICS feeds; Google/MS
  # later) into the brain as event nodes. No volume — events live in Postgres.
  worker_calendar:
    image: ${MANTLE_IMAGE_NAMESPACE:-titanwest}/mantle:${MANTLE_IMAGE_TAG:-latest}
    command: ["pnpm", "-C", "apps/web", "exec", "tsx", "workers/calendar-sync.ts"]
    container_name: mantle_worker_calendar
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    environment:
      <<: *app-env

  # Push-notify worker — LISTENs on conversation_changed and forwards sealed
  # teasers to Mantle Push (push.crossworks.network) for backgrounded devices.
  # No-op until a device Connects (push_instance/push_subscriptions empty).
  worker_push:
    image: ${MANTLE_IMAGE_NAMESPACE:-titanwest}/mantle:${MANTLE_IMAGE_TAG:-latest}
    command: ["pnpm", "-C", "apps/web", "exec", "tsx", "workers/push-notify.ts"]
    container_name: mantle_worker_push
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    environment:
      <<: *app-env
