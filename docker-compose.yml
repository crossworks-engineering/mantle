name: mantle

# Mantle full stack: postgres + minio + web + agent + workers.
# For local dev, prefer `pnpm up` (uses docker-compose.dev.yml — infra only,
# app in native Node for hot-reload). This file is for prod-shaped deploys
# where everything runs in containers.
#
# Required env (drop in .env next to this file, or export before `docker compose up`):
#   POSTGRES_PASSWORD       (default: postgres)
#   SESSION_SECRET          (mandatory — used by middleware to verify cookies)
#   MANTLE_MASTER_KEY       (mandatory — AES-256 key, base64 32 random bytes)
#   ALLOWED_USER_ID         (mandatory — uuid of the single auth.users row)
#   S3_ACCESS_KEY / S3_SECRET_KEY (default: minio/minio12345)
#   MANTLE_PUBLIC_URL       (recommended — public origin for share/email links,
#                            e.g. https://mantle.crossworks.network)
#   MANTLE_LOCAL_EMBEDDING_URL (default: http://ollama:11434/v1 — the bundled
#                            embedder; no need to set unless pointing elsewhere)
#   MANTLE_EMBEDDING_PULL_MODEL (default: embeddinggemma — the model the one-shot
#                            pulls on first boot)
#   OLLAMA_KEEP_ALIVE       (default: 5m — set to -1 to keep the embedder always
#                            resident instead of unloading when idle)
#
# Optional — reach models on a box you own behind NAT (home GPU / LAN server):
#   docker compose --profile tailnet up -d   (off by default)
#   TS_AUTHKEY              (Tailscale auth key — generate in the TS admin
#                            console; required to bring the tailnet profile up)
#   TS_HOSTNAME            (default: mantle-vps — this node's name on the tailnet)
#   MANTLE_TAILNET_PROXY_URL (default: http://tailscale:1055 — the in-compose
#                            HTTP proxy; only used by routes flagged "via tailnet")
#   See docs/tailscale.md.
#
# Build & run:
#   docker compose build
#   docker compose up -d --wait
#
# First boot pulls the embedder (EmbeddingGemma, ~300MB) once into a named
# volume via the `ollama_pull` one-shot — local embedding then works with no
# cloud key. Migrations run automatically — the one-shot `migrate` service
# applies them before any app service starts (each depends on it completing).
# No manual step.

volumes:
  mantle_pg_data:
  mantle_minio_data:
  # Host-mirrored filesystem: real folders + files visible to ingestion,
  # MCP, and the web /files UI. Mount this somewhere on the host you can
  # back up / sync from (Syncthing, restic, etc.).
  mantle_files_data:
  # Ollama model store — the shipped embedder (EmbeddingGemma, ~300MB) is
  # pulled once into here by the `ollama_pull` one-shot and persists across
  # restarts/redeploys, so it's never re-downloaded.
  mantle_ollama_data:
  # Tailscale node state (identity + keys) — persists across restarts so the
  # node doesn't re-auth every boot. Only used by the optional `tailnet` profile.
  mantle_tailscale_data:
  # Tailscale runtime socket dir (tailscaled.sock) — shared so the app can read
  # the LocalAPI (`status`) for the /settings/network status tile + peer
  # dropdown. Only the optional `tailnet` profile populates it; the app reads it
  # read-only and degrades to "tailnet not running" when absent.
  mantle_tailscale_sock:

# Shared env block for app services — anchor + alias keeps the app
# services in lockstep.
x-app-env: &app-env
  DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
  SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
  MANTLE_MASTER_KEY: ${MANTLE_MASTER_KEY:?MANTLE_MASTER_KEY is required}
  ALLOWED_USER_ID: ${ALLOWED_USER_ID:?ALLOWED_USER_ID is required}
  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_BUCKET: mantle
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minio12345}
  S3_FORCE_PATH_STYLE: 'true'
  NODE_ENV: production
  MANTLE_EMBEDDING_MODEL: ${MANTLE_EMBEDDING_MODEL:-}
  # Self-hosted embedder. Points at the bundled `ollama` service serving
  # EmbeddingGemma (768-dim). This is what makes local embedding work out of
  # the box — no cloud key, no API calls, fast. The resolver already defaults
  # a fresh install to local/embeddinggemma:latest; this just supplies the host.
  MANTLE_LOCAL_EMBEDDING_URL: ${MANTLE_LOCAL_EMBEDDING_URL:-http://ollama:11434/v1}
  # HTTP forward-proxy for reaching models on your tailnet (the optional
  # `tailnet` profile). Only used for routes the operator flags "via tailnet";
  # harmless otherwise. Points at the bundled tailscale service.
  MANTLE_TAILNET_PROXY_URL: ${MANTLE_TAILNET_PROXY_URL:-http://tailscale:1055}
  # Path to the tailscaled LocalAPI socket (shared from the tailscale sidecar).
  # The /settings/network status tile + peer dropdown read `status` over it.
  # Absent socket → the reader reports "tailnet not running" (never throws).
  MANTLE_TAILSCALE_SOCK: ${MANTLE_TAILSCALE_SOCK:-/var/run/tailscale/tailscaled.sock}
  MANTLE_FILES_ROOT: /data/files
  # Public origin for absolute links built outside an HTTP request — e.g. the
  # agent's page_share / email_page tools. Falls back to localhost in code if
  # unset, so set it to the real host (https://mantle.crossworks.network).
  MANTLE_PUBLIC_URL: ${MANTLE_PUBLIC_URL:-}
  # Tika document-parser fallback (.odt / .pptx / .doc / .rtf / …). Reached
  # by service name on the internal docker network. See docs/file-ingestion.md.
  TIKA_URL: http://tika:9998

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mantle_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - mantle_pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: mantle_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio12345}
    volumes:
      - mantle_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Apache Tika — document-parser fallback for formats our in-process parsers
  # don't cover (.odt / .ods / .odp / .pptx / .ppt / .doc / .rtf / .epub / …).
  # Self-hosted; bytes stay on the VPS. Stateless — no volume.
  tika:
    image: apache/tika:3.3.0.0
    container_name: mantle_tika
    restart: unless-stopped
    environment:
      # Cap JVM heap so Tika can't balloon on a malicious or pathological
      # document. JAVA_TOOL_OPTIONS not JAVA_OPTS — Tika's launcher doesn't
      # propagate JAVA_OPTS to the forked TikaServerProcess (verified live).
      # See docker-compose.dev.yml for the rationale.
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms128m"
    healthcheck:
      # apache/tika image has only bash (no curl/wget/nc), so probe via
      # bash's built-in /dev/tcp + a minimal HTTP/1.0 GET against /version.
      # CMD (not CMD-SHELL) so we invoke bash explicitly — /dev/tcp is
      # bash-specific and not available in /bin/sh.
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/localhost/9998 || exit 1; printf "GET /version HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3; read -t 2 line <&3; [[ "$$line" == *"200 OK"* ]]'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Ollama — serves the bundled local embedder (EmbeddingGemma, 768-dim) over an
  # OpenAI-compatible API. CPU-only; the embedder is a small encoder (~300MB,
  # a few hundred MB RAM when loaded) that fits comfortably on the 8GB/6-core
  # base VPS alongside the rest. Self-hosted — the text the brain embeds never
  # leaves the box. The app reaches it at http://ollama:11434/v1 (MANTLE_LOCAL_
  # EMBEDDING_URL). Set OLLAMA_KEEP_ALIVE=-1 to keep the model always resident
  # (default unloads after ~5min idle to free RAM; next embed reloads in ~1s).
  ollama:
    image: ollama/ollama:latest
    container_name: mantle_ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    volumes:
      - mantle_ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # One-shot: pull the shipped embedder into the model volume, then exit.
  # Mirrors the `migrate` pattern — app services that embed wait for it to
  # complete. Idempotent: a no-op once the model is already in the volume, so
  # it's safe on every `up` / redeploy. Override the model via env if you ship
  # a different default.
  ollama_pull:
    image: ollama/ollama:latest
    container_name: mantle_ollama_pull
    restart: "no"
    depends_on:
      ollama: { condition: service_healthy }
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "${MANTLE_EMBEDDING_PULL_MODEL:-embeddinggemma}"]

  # ── Tailscale (OPTIONAL — `tailnet` profile) ──────────────────────────────
  # Reaches capable chat/vision models running on a box you own (home GPU, LAN
  # server) that's behind NAT — without port-forwarding or public IPs. Joins
  # your tailnet; the app then reaches `http://<magicdns-name>:<port>` for that
  # box by name. See docs/tailscale.md.
  #
  # Off by default. Enable with:  docker compose --profile tailnet up -d
  # Set TS_AUTHKEY (generate one in the Tailscale admin console) before bringing
  # it up. Userspace networking → no TUN device / NET_ADMIN cap needed (safe).
  # Exposes an HTTP forward-proxy on :1055 that the app dispatches tailnet-bound
  # model calls through (MANTLE_TAILNET_PROXY_URL), keeping compose service-DNS
  # intact for everything internal.
  tailscale:
    image: tailscale/tailscale:latest
    container_name: mantle_tailscale
    restart: unless-stopped
    profiles: ["tailnet"]
    hostname: ${TS_HOSTNAME:-mantle-vps}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: ${TS_HOSTNAME:-mantle-vps}
      TS_USERSPACE: "true"
      TS_STATE_DIR: /var/lib/tailscale
      # HTTP forward-proxy for outbound tailnet traffic — undici ProxyAgent
      # speaks to this. (SOCKS5 is also available via TS_SOCKS5_SERVER if a
      # client needs it, but the Node fetch path uses the HTTP proxy.)
      TS_OUTBOUND_HTTP_PROXY_LISTEN: 0.0.0.0:1055
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:-}
      # Pin the socket into the shared volume so the app can read LocalAPI.
      TS_SOCKET: /var/run/tailscale/tailscaled.sock
    volumes:
      - mantle_tailscale_data:/var/lib/tailscale
      - mantle_tailscale_sock:/var/run/tailscale
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s

  # One-shot schema migration. App services wait for this to complete
  # successfully before starting, so the DB schema is never behind the code on
  # a redeploy — and a single dedicated migrator means no race on the migrator.
  migrate:
    build:
      context: .
      target: migrate
    container_name: mantle_migrate
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      <<: *app-env

  web:
    build:
      context: .
      target: web
    container_name: mantle_web
    restart: unless-stopped
    depends_on:
      postgres:    { condition: service_healthy }
      minio:       { condition: service_healthy }
      migrate:     { condition: service_completed_successfully }
      ollama_pull: { condition: service_completed_successfully }
    environment:
      <<: *app-env
    volumes:
      - mantle_files_data:/data/files
      # Read-only view of the tailscaled LocalAPI socket for the
      # /settings/network status tile + peer dropdown. Empty until the
      # `tailnet` profile is up; the reader degrades gracefully when absent.
      - mantle_tailscale_sock:/var/run/tailscale:ro
    ports:
      - "3000:3000"

  agent:
    build:
      context: .
      target: agent
    container_name: mantle_agent
    restart: unless-stopped
    depends_on:
      postgres:    { condition: service_healthy }
      migrate:     { condition: service_completed_successfully }
      ollama_pull: { condition: service_completed_successfully }
    environment:
      <<: *app-env
    volumes:
      - mantle_files_data:/data/files

  worker_email:
    build:
      context: .
      target: worker-email
    container_name: mantle_worker_email
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      minio:    { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    environment:
      <<: *app-env

  worker_telegram:
    build:
      context: .
      target: worker-telegram
    container_name: mantle_worker_telegram
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    environment:
      <<: *app-env

  # External-edit watcher: chokidar over MANTLE_FILES_ROOT mirrors host file
  # changes (Syncthing / vim / cp) into the brain. Needs the files volume.
  worker_files:
    build:
      context: .
      target: worker-files
    container_name: mantle_worker_files
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    environment:
      <<: *app-env
    volumes:
      - mantle_files_data:/data/files

  # Event-reminder poller: fires due calendar/event reminders. Without this,
  # reminders silently never fire in prod (they work in `pnpm dev`).
  worker_events:
    build:
      context: .
      target: worker-events
    container_name: mantle_worker_events
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    environment:
      <<: *app-env
