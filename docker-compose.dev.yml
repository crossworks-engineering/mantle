# Project + container names are deliberately DISTINCT from the prod
# docker-compose.yml (project `mantle`, containers `mantle_pg` etc.). They used
# to be identical, and on a host that also runs a live prod stack, `docker
# compose -f docker-compose.dev.yml up` would RECREATE the prod containers and
# take the live brain down (2026-07-02 dev-box incident). Host ports (54323 /
# 9000 / 9001 / 9998) are unchanged, so existing .env.local files keep working.
name: mantle-dev

# Mantle dev infra: just Postgres + MinIO.
# apps/web, apps/mcp, and workers run as native Node via `pnpm dev`.
# Bring everything up with `pnpm up` (which runs scripts/up.sh).

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mantle_dev_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      # 54323 on the host. The .env.local DATABASE_URL must point here.
      - "127.0.0.1:54323:5432"
    volumes:
      - ${MANTLE_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: mantle_dev_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # web console
    volumes:
      - ${MANTLE_DATA_DIR:-./data}/minio:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Apache Tika — the third-tier document parser (the first two being our
  # in-process pdf-parse / mammoth / SheetJS, and the vision worker for
  # scanned PDFs). Used as a fallback for formats those can't handle:
  # .odt / .ods / .odp (LibreOffice), .pptx / .ppt, .doc (legacy Word),
  # .rtf, .epub, plus the long-tail Tika supports. Self-hosted, stateless
  # — bytes never leave the VPS. See docs/file-ingestion.md.
  tika:
    image: apache/tika:3.3.0.0
    container_name: mantle_dev_tika
    restart: unless-stopped
    environment:
      # Cap JVM heap so Tika can't balloon on a malicious or pathological
      # document. Default JVM in containers auto-sizes to ~1/4 of host RAM
      # (so 2 GB on an 8 GB host) — fine on a beefy VPS but unbounded.
      # 512 MB max + 128 MB min covers Mantle's 25 MB MAX_UPLOAD_BYTES cap
      # with headroom. Adjust if a real document type pushes it
      # (parse_document step's `chars_out: 0` + short duration is the
      # signal that Tika OOM'd).
      #
      # We use JAVA_TOOL_OPTIONS (read by the JVM itself on startup) rather
      # than JAVA_OPTS — Tika's launcher script doesn't propagate JAVA_OPTS
      # to the forked TikaServerProcess (verified live: with JAVA_OPTS set,
      # MaxHeapSize stayed at the JVM ergonomic default of ~2 GB).
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms128m"
    ports:
      # 9998 on the host. apps/web + workers run as native Node in dev
      # and reach Tika here. TIKA_URL in .env.local must match.
      - "127.0.0.1:9998:9998"
    healthcheck:
      # apache/tika image has only bash (no curl/wget/nc), so probe via
      # bash's built-in /dev/tcp + a minimal HTTP/1.0 GET against /version.
      # CMD (not CMD-SHELL) so we invoke bash explicitly — /dev/tcp is
      # bash-specific and not available in /bin/sh.
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/localhost/9998 || exit 1; printf "GET /version HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3; read -t 2 line <&3; [[ "$$line" == *"200 OK"* ]]'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
